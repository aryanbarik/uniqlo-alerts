name: Uniqlo stock watch

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15 minutes
  workflow_dispatch:          # lets you trigger a run manually from the Actions tab

# Allow the workflow to commit the updated state file back to the repo
permissions:
  contents: write

# Prevent overlapping runs from racing on the state file
concurrency:
  group: stock-watch
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run watcher
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python watch.py

      - name: Commit updated state
        run: |
          git config user.name "stock-bot"
          git config user.email "stock-bot@users.noreply.github.com"
          git add stock_state.json
          git diff --quiet --cached || git commit -m "update stock state"
          git push
